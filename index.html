<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Bambanker Cell Catcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #f0f7ff, #c7d9ff);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .game-wrapper {
      background: #ffffffdd;
      backdrop-filter: blur(6px);
      padding: 16px 20px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 460px;
      width: 100%;
    }

    h1 {
      font-size: 18px;
      text-align: center;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 12px;
      text-align: center;
      color: #555;
      margin-bottom: 6px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .top-bar span {
      font-weight: 500;
    }

    .controls {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-bottom: 4px;
    }

    canvas {
      border-radius: 14px;
      background: linear-gradient(#f5fbff, #e0efff);
      border: 1px solid #d0ddff;
      display: block;
      margin: 0 auto;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      margin-top: 6px;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      background: #304ffe;
      color: white;
      font-weight: 500;
      box-shadow: 0 4px 10px rgba(48, 79, 254, 0.35);
      transition: transform 0.1s ease, box-shadow 0.1s ease, opacity 0.15s;
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 2px 6px rgba(48, 79, 254, 0.25);
    }

    button.secondary {
      background: #e0e7ff;
      color: #1a237e;
      box-shadow: none;
    }

    @media (max-width: 480px) {
      .game-wrapper {
        margin: 10px;
        padding: 14px;
      }
      canvas {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>Bambanker Cell Catcher</h1>
    <div class="subtitle">Hücreleri Nippon Genetics Bambanker şişesinde dondur, puan topla!</div>

    <div class="top-bar">
      <div>Skor: <span id="score">0</span></div>
      <div>Kaçan hücre: <span id="misses">0</span> / 5</div>
    </div>

    <div class="controls">
      Sol / Sağ ok tuşlarıyla ya da fareyi sağa sola oynatarak şişeyi hareket ettirebilirsin. <br />
      Başlat / sıfırla: <strong>Boşluk (Space)</strong> ya da <strong>Yeniden Başlat</strong> düğmesi.
    </div>

    <canvas id="game" width="380" height="560"></canvas>

    <div class="btn-row">
      <button id="restartBtn">Yeniden Başlat</button>
      <button class="secondary" id="infoBtn">Nasıl Oynanır?</button>
    </div>
      <div id="scoreSubmitBox" style="display:none; text-align:center;">
  <h2>Submit your score</h2>
  <input id="playerName" placeholder="Name">
  <input id="playerEmail" placeholder="Email">
  <button onclick="submitScore()" id="submitBtn">
    Submit Score
  </button>
</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const missesEl = document.getElementById("misses");
    const restartBtn = document.getElementById("restartBtn");
    const infoBtn = document.getElementById("infoBtn");

    const bottle = {
      x: canvas.width / 2 - 30,
      y: canvas.height - 90,
      width: 60,
      height: 80,
      speed: 6
    };

    let cells = [];
    let score = 0;
    let misses = 0;
    const maxMisses = 5;
    let lastSpawn = 0;
    let spawnInterval = 800; // ms
    let lastTime = 0;
    let gameOver = false;
    let running = false;

    let leftPressed = false;
    let rightPressed = false;

    function resetGame() {
      score = 0;
      misses = 0;
      scoreEl.textContent = score;
      missesEl.textContent = misses;
      cells = [];
      lastSpawn = 0;
      gameOver = false;
      running = true;
      bottle.x = canvas.width / 2 - bottle.width / 2;
    }

    function spawnCell() {
      const radius = 12;
      const x = Math.random() * (canvas.width - 2 * radius) + radius;
      const speed = 1.8 + Math.random() * 2.5;
      cells.push({ x, y: -radius, radius, speed });
    }

    function drawBottle() {
      ctx.save();

      // gövde
      ctx.fillStyle = "#f5f5f5";
      ctx.strokeStyle = "#455a64";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(bottle.x, bottle.y + 10, bottle.width, bottle.height - 10, 12);
      ctx.fill();
      ctx.stroke();

      // boyun
      ctx.fillStyle = "#e0f2f1";
      ctx.fillRect(bottle.x + bottle.width * 0.25, bottle.y, bottle.width * 0.5, 18);
      ctx.strokeRect(bottle.x + bottle.width * 0.25, bottle.y, bottle.width * 0.5, 18);

      // kapak
      ctx.fillStyle = "#00acc1";
      ctx.fillRect(bottle.x + bottle.width * 0.22, bottle.y - 8, bottle.width * 0.56, 8);

      // etiket
      ctx.fillStyle = "#e3f2fd";
      ctx.fillRect(bottle.x + 6, bottle.y + 30, bottle.width - 12, 28);
      ctx.strokeRect(bottle.x + 6, bottle.y + 30, bottle.width - 12, 28);

      ctx.fillStyle = "#1a237e";
      ctx.font = "9px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("Nippon", bottle.x + bottle.width / 2, bottle.y + 43);
      ctx.fillText("Bambanker", bottle.x + bottle.width / 2, bottle.y + 55);

      ctx.restore();
    }

    function drawCell(cell) {
      const gradient = ctx.createRadialGradient(
        cell.x - cell.radius / 3, cell.y - cell.radius / 3, 2,
        cell.x, cell.y, cell.radius
      );
      gradient.addColorStop(0, "rgba(255, 255, 255, 1)");
      gradient.addColorStop(0.4, "rgba(129, 212, 250, 0.9)");
      gradient.addColorStop(1, "rgba(3, 155, 229, 0.9)");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(cell.x, cell.y, cell.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(2, 119, 189, 0.9)";
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // minik nukleus
      ctx.fillStyle = "rgba(13, 71, 161, 0.35)";
      ctx.beginPath();
      ctx.arc(cell.x - cell.radius / 3, cell.y - cell.radius / 4, cell.radius / 2.3, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawBackground() {
      // hafif grid & hatlar
      ctx.save();
      ctx.strokeStyle = "rgba(33, 150, 243, 0.08)";
      ctx.lineWidth = 1;

      for (let i = 0; i < 8; i++) {
        const y = (canvas.height / 8) * i;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      for (let i = 0; i < 6; i++) {
        const x = (canvas.width / 6) * i;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      ctx.restore();
    }

    function checkCollision(cell) {
      // "yakalama" bölgesi: şişenin üst kısmı
      const mouthTop = bottle.y;
      const mouthBottom = bottle.y + 10;
      const mouthLeft = bottle.x;
      const mouthRight = bottle.x + bottle.width;

      // Hücre alt noktası şişe ağız bölgesine girerse
      const cellBottom = cell.y + cell.radius;
      const withinVertical = cellBottom >= mouthTop && cellBottom <= mouthBottom + 8;
      const withinHorizontal = cell.x >= mouthLeft && cell.x <= mouthRight;

      return withinVertical && withinHorizontal;
    }

    function update(dt) {
      if (!running || gameOver) return;

      // şişe hareketi
      if (leftPressed) {
        bottle.x -= bottle.speed;
      }
      if (rightPressed) {
        bottle.x += bottle.speed;
      }
      if (bottle.x < 0) bottle.x = 0;
      if (bottle.x + bottle.width > canvas.width) {
        bottle.x = canvas.width - bottle.width;
      }

      // hücre spawn
      lastSpawn += dt;
      if (lastSpawn > spawnInterval) {
        spawnCell();
        lastSpawn = 0;
      }

      // hücreleri güncelle
      for (let i = cells.length - 1; i >= 0; i--) {
        const cell = cells[i];
        cell.y += cell.speed;

        // yakalandı mı?
        if (checkCollision(cell)) {
          score += 1;
          scoreEl.textContent = score;
          cells.splice(i, 1);
          continue;
        }

        // kaçtı mı?
        if (cell.y - cell.radius > canvas.height) {
  misses += 1;
  missesEl.textContent = misses;
  cells.splice(i, 1);

  if (misses >= maxMisses) {
    gameOver = true;
    running = false;
    window.finalScore = score;

    document.getElementById("scoreSubmitBox").style.display = "block";
  }
}
      }
    }

    function drawOverlay() {
      if (!gameOver) return;

      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "24px system-ui";
      ctx.fillText("Oyun Bitti!", canvas.width / 2, canvas.height / 2 - 10);

      ctx.font = "16px system-ui";
      ctx.fillText("Toplam Skor: " + score, canvas.width / 2, canvas.height / 2 + 18);
      ctx.font = "13px system-ui";
      ctx.fillText("Yeniden başlatmak için Space'e", canvas.width / 2, canvas.height / 2 + 42);
      ctx.fillText("veya 'Yeniden Başlat' düğmesine bas.", canvas.width / 2, canvas.height / 2 + 60);

      ctx.restore();
    }

    function loop(timestamp) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground();

      // hücreler
      cells.forEach(drawCell);

      // şişe
      drawBottle();

      // güncelleme
      update(dt);

      // overlay
      drawOverlay();

      requestAnimationFrame(loop);
    }

    // Klavye kontrolleri
    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowLeft") leftPressed = true;
      if (e.code === "ArrowRight") rightPressed = true;

      if (e.code === "Space") {
        e.preventDefault();
        if (!running) {
          resetGame();
       document.getElementById("scoreSubmitBox").style.display = "none"; }
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.code === "ArrowLeft") leftPressed = false;
      if (e.code === "ArrowRight") rightPressed = false;
    });

    // Fare ile kontrol
    canvas.addEventListener("mousemove", (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const x = (e.clientX - rect.left) * scaleX;
      bottle.x = x - bottle.width / 2;
      if (bottle.x < 0) bottle.x = 0;
      if (bottle.x + bottle.width > canvas.width) {
        bottle.x = canvas.width - bottle.width;
      }
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
    });

    infoBtn.addEventListener("click", () => {
      alert(
        "Amaç: Yukarıdan düşen hücreleri Bambanker şişesiyle yakalamak.\n\n" +
        "- Sol / Sağ ok tuşları veya fare ile şişeyi hareket ettir.\n" +
        "- Hücreler şişenin ağzına değerse yakalanır ve skor kazanırsın.\n" +
        "- 5 hücre kaçırırsan oyun biter.\n" +
        "- Space veya 'Yeniden Başlat' ile oyunu sıfırlayabilirsin."
      );
    });

    // başlangıç
    resetGame();
    requestAnimationFrame(loop);
  </script>

</button>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDZEBs2xiFLp_IG6_L_27yLetCtdEWHlP4",
  authDomain: "nippon-game-5c77d.firebaseapp.com",
  projectId: "nippon-game-5c77d",
  storageBucket: "nippon-game-5c77d.firebasestorage.app",
  messagingSenderId: "1002140228635",
  appId: "1:1002140228635:web:c8a54aa125a6a6ff28acbe"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitScore = async function () {
  const name = document.getElementById("playerName").value;
  const email = document.getElementById("playerEmail").value;

  const score = window.finalScore; // IMPORTANT

  if (!name || !email || !score) {
    alert("Fill everything");
    return;
  }

  await addDoc(collection(db, "scores"), {
    name,
    email,
    score,
    createdAt: serverTimestamp()
  });

  alert("Submitted!");
};
</script>
</html>
